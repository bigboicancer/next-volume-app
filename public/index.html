<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="application-name" content="Next Volume" />
    <meta name="description" content="Keep track of every manga and light-novel volume you read." />
    <meta name="theme-color" content="#0B0E14" />
    <meta name="color-scheme" content="dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Next Volume" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="logo192.png" />
    <title>%WEB_TITLE%</title>
    <style id="expo-reset">
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #0b0e14;
        overscroll-behavior: none;
      }

      body {
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
      }

      #root {
        display: flex;
        width: 100%;
        height: 100%;
        height: 100dvh;
        min-height: 0;
        flex: 1;
        overflow: hidden;
      }
    </style>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register(new URL('sw.js', document.baseURI), { scope: './' });
        });
      }
    </script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run Next Volume.</noscript>
    <div id="root"></div>
  </body>
</html>
